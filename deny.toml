# Which target platforms cargo-deny evaluates.
[graph]
targets = [
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "aarch64-apple-darwin",
]
all-features = false
no-default-features = false

# Keep dependency graph output compact in diagnostics.
[output]
feature-depth = 1

# Security advisories from RustSec.
[advisories]
ignore = [
    # Unmaintained transitive dependency via indicatif's progress bar; no fix is available.
    { id = "RUSTSEC-2025-0119", reason = "number_prefix unmaintained; pulled in by indicatif, no fix available" },
]

# Licenses allowed anywhere in the dependency graph.
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",         # icu / unicode-ident
    "MPL-2.0",             # colored, via simple_logger
    "ISC",                 # reqwest/rustls TLS stack
    "BSD-3-Clause",        # subtle, via TLS stack
    "BSL-1.0",             # xxhash-rust and ryu
    "CDLA-Permissive-2.0", # webpki-roots, via reqwest
    "MIT-0",               # borrow-or-share, via jsonschema
    "Zlib",                # foldhash, via jsonschema
]
confidence-threshold = 0.8
exceptions = []

# How to treat unpublished/private workspace crates.
[licenses.private]
ignore = false
registries = []

# Dependency bans and duplicate-version policy.
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# Allowed package registries and git sources.
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

# Allowed source-control organizations for git dependencies.
[sources.allow-org]
github = []
gitlab = []
bitbucket = []
