name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            make: make
            target: x86_64-unknown-linux-musl
            target_cpu: x86-64-v3 # AVX2-class Linux x86_64 build.
            asset_suffix: x86_64-v3-unknown-linux-musl
          - os: ubuntu-24.04-arm
            make: make
            target: aarch64-unknown-linux-musl
            target_cpu: generic # Baseline arm64.
            asset_suffix: aarch64-unknown-linux-musl
          - os: macos-15
            make: gmake
            target: aarch64-apple-darwin
            target_cpu: apple-m1 # Minimum Apple Silicon CPU.
            asset_suffix: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install GNU Make (macOS)
        if: runner.os == 'macOS'
        run: brew install make

      - name: Build release binary
        run: ${{ matrix.make }} build-release RUST_TARGET=${{ matrix.target }} RUST_TARGET_CPU=${{ matrix.target_cpu }}

      - name: Package and checksum
        run: |
          asset="comet-enrich-${{ github.ref_name }}-${{ matrix.asset_suffix }}"
          mkdir -p dist
          tar -czf "dist/${asset}.tar.gz" -C "target/${{ matrix.target }}/release" comet-enrich
          ( cd dist && shasum -a 256 "${asset}.tar.gz" > "${asset}.tar.gz.sha256" )

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.asset_suffix }}
          path: dist/*
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Assemble combined checksums
        run: |
          version="${{ github.ref_name }}"
          ( cd dist && cat $(ls *.tar.gz.sha256 | LC_ALL=C sort) > "comet-enrich-${version}-SHA256SUMS.txt" )

      - name: Upload release assets
        run: |
          gh release upload "${{ github.ref_name }}" dist/* \
            --repo "${{ github.repository }}"
