name: CI

on: push

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            make: make
          - os: macos-latest
            make: gmake

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # Install GNU Make 3.81 for macOS so that .RECIPEPREFIX is supported
      - name: Install GNU Make (macOS)
        if: runner.os == 'macOS'
        run: brew install make

      - name: Cache Rust
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo
            ~/.rustup
            target/
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Setup Rust tools
        run: ${{ matrix.make }} setup-rust

      - name: Build
        run: ${{ matrix.make }} build

      - name: Check formatting
        run: ${{ matrix.make }} fmt-ci

      - name: Lint
        run: ${{ matrix.make }} lint-ci

      - name: Test
        run: ${{ matrix.make }} test
